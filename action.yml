name: 'Telegram Command Handler'
description: 'Routes a Telegram user command to the consumer project handler script'
branding:
  icon: 'terminal'
  color: 'blue'
inputs:
  command:
    description: 'Command name (e.g. disable)'
    required: true
  chat_id:
    description: 'Telegram chat ID that sent the command'
    required: true
  args:
    description: 'Command arguments (everything after the command in the message)'
    required: false
    default: ''
  bot_token:
    description: 'Telegram bot token for sending replies'
    required: true
runs:
  using: 'composite'
  steps:
    - shell: bash
      run: |
        chmod +x "${{ github.action_path }}/handler.sh"
        "${{ github.action_path }}/handler.sh" \
          "${{ inputs.command }}" \
          "${{ inputs.chat_id }}" \
          "${{ inputs.args }}" \
          "${{ inputs.bot_token }}"
